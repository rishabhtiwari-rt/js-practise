<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body style="background-color: #212121; color: #fff";>
  <ul class="language">
    <li>Javascript</li>
  </ul>
</body>
<script>
  function addLanguage(langName){
    const list = document.createElement('li')
    list.innerHTML = `${langName}`
    document.querySelector('.language').appendChild(list)
  }
  addLanguage("python")
  addLanguage("typescript")

  function addLanguageOpti(langName){
    const list = document.createElement('li')
    list.appendChild(document.createTextNode(langName))
    document.querySelector('.language').appendChild(list)
  }
  addLanguageOpti('PHP')

  // EDIT

  const secondLang = document.querySelector('li:nth-child(2)')
  // secondLang.innerHTML = 'JAVA'
  const newli = document.createElement('li')
  newli.textContent = 'Mojo'
  secondLang.replaceWith(newli)

  // edit
const firstLang = document.querySelector("li:first-child")
firstLang.textContent = 'Ruby'

// remove

const lastlang = document.querySelector('li:last-child')
lastlang.remove()
</script>
</html>
